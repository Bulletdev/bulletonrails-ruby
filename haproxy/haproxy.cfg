global
    maxconn 4096
    log /dev/null local0

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s

defaults
    mode http
    timeout connect 500ms
    timeout client  10s
    timeout server  10s
    option http-server-close

frontend rinha_front
    bind *:9999
    default_backend rinha_back

backend rinha_back
    balance roundrobin
    server api1 api1:9999 resolvers docker init-addr none
    server api2 api2:9999 resolvers docker init-addr none
