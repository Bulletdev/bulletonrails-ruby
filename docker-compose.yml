services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"
    networks:
      - backend

  api1:
    image: michaelbullet/bulletonrails-ruby:latest
    hostname: api1
    expose:
      - "9999"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    networks:
      - backend

  api2:
    image: michaelbullet/bulletonrails-ruby:latest
    hostname: api2
    expose:
      - "9999"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    networks:
      - backend

networks:
  backend:
    driver: bridge
